name: Focus Reminder

on:
  schedule:
    # Runs every hour at :00, Mon–Fri
    # GitHub Actions uses UTC — IST is UTC+5:30
    # To cover 8 AM–10 PM IST, we run 2:30 AM–4:30 PM UTC
    # Cron doesn't support :30, so we use :00 and handle the offset in Python
    - cron: '30 4 * * 1-5'   # 10:00 AM IST
    - cron: '30 5 * * 1-5'   # 11:00 AM IST
    - cron: '30 6 * * 1-5'   # 12:00 PM IST
    - cron: '30 7 * * 1-5'   #  1:00 PM IST
    - cron: '30 8 * * 1-5'   #  2:00 PM IST
    - cron: '30 9 * * 1-5'   #  3:00 PM IST
    - cron: '30 10 * * 1-5'  #  4:00 PM IST
    - cron: '30 11 * * 1-5'  #  5:00 PM IST
    - cron: '30 12 * * 1-5'  #  6:00 PM IST
    - cron: '30 13 * * 1-5'  #  7:00 PM IST
    - cron: '30 14 * * 1-5'  #  8:00 PM IST
    - cron: '30 15 * * 1-5'  #  9:00 PM IST
    - cron: '30 16 * * 1-5'  #  9:00 PM IST
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send reminder
        run: python main.py
        env:
          SENDER_EMAIL:       ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL:     ${{ secrets.RECEIVER_EMAIL }}
          APP_PASSWORD:       ${{ secrets.APP_PASSWORD }}
          ACTIVE_HOURS_START: ${{ secrets.ACTIVE_HOURS_START }}
          ACTIVE_HOURS_END:   ${{ secrets.ACTIVE_HOURS_END }}
