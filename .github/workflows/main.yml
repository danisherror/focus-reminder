name: Focus Reminder

on:
  schedule:
    - cron: '30 4  * * *'   # 10:00 AM IST — runs till ~4:00 PM IST
    - cron: '30 10 * * *'   # 4:00 PM IST  — runs till 11:00 PM IST
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 hours — enough for 10 AM–11 PM IST (13 hrs max, but job exits cleanly at end time)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send reminder
        run: python main.py
        env:
          SENDER_EMAIL:       ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL:     ${{ secrets.RECEIVER_EMAIL }}
          APP_PASSWORD:       ${{ secrets.APP_PASSWORD }}
          ACTIVE_HOURS_START: ${{ secrets.ACTIVE_HOURS_START }}
          ACTIVE_HOURS_END:   ${{ secrets.ACTIVE_HOURS_END }}