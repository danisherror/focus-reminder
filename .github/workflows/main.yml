name: Focus Reminder

on:
  schedule:
    - cron: '30 4  * * *'   # 10:00 AM IST
    - cron: '10 5  * * *'   # 10:40 AM IST
    - cron: '50 5  * * *'   # 11:20 AM IST
    - cron: '30 6  * * *'   # 12:00 PM IST
    - cron: '10 7  * * *'   # 12:40 PM IST
    - cron: '50 7  * * *'   #  1:20 PM IST
    - cron: '30 8  * * *'   #  2:00 PM IST
    - cron: '10 9  * * *'   #  2:40 PM IST
    - cron: '50 9  * * *'   #  3:20 PM IST
    - cron: '30 10 * * *'   #  4:00 PM IST
    - cron: '10 11 * * *'   #  4:40 PM IST
    - cron: '50 11 * * *'   #  5:20 PM IST
    - cron: '30 12 * * *'   #  6:00 PM IST
    - cron: '10 13 * * *'   #  6:40 PM IST
    - cron: '50 13 * * *'   #  7:20 PM IST
    - cron: '30 14 * * *'   #  8:00 PM IST
    - cron: '10 15 * * *'   #  8:40 PM IST
    - cron: '50 15 * * *'   #  9:20 PM IST
    - cron: '30 16 * * *'   # 10:00 PM IST
    - cron: '10 17 * * *'   # 10:40 PM IST
    - cron: '50 17 * * *'   # 11:20 PM IST
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send reminder
        run: python main.py
        env:
          SENDER_EMAIL:       ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL:     ${{ secrets.RECEIVER_EMAIL }}
          APP_PASSWORD:       ${{ secrets.APP_PASSWORD }}
          ACTIVE_HOURS_START: ${{ secrets.ACTIVE_HOURS_START }}
          ACTIVE_HOURS_END:   ${{ secrets.ACTIVE_HOURS_END }}